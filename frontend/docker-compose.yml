services:
  frontend:
    container_name: jussaw-frontend
    image: ghcr.io/jussaw/jussaw-app-frontend:latest
    ports:
      - "23412:3000"
    environment:
      - NODE_ENV=production
      # Server-only runtime vars (add as needed):
      # - DATABASE_URL=postgres://...
      # - SECRET_KEY=...
      # - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=...
    restart: always
