# pnpm settings (pnpm 11+ no longer reads the "pnpm" field in package.json)
allowBuilds:
  sharp: true # next/image native binaries
  unrs-resolver: true # eslint-import-resolver-typescript native bindings
overrides:
  'postcss@<8.5.10': ^8.5.10
  vite: ^8.0.5
supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - x64
    - arm64
